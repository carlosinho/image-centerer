name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-package:
    name: Build, test, and package
    # Swift 6.2 requires Xcode 26, which ships on the macOS 26 runner image.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: ./scripts/test.sh

      - name: Package app bundle
        run: ./scripts/package-app.sh
